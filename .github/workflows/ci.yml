name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff jsonschema
      - name: Lint (errors only)
        run: ruff check --select E9,F63,F7,F82 .
      - name: Tests
        run: pytest tests/ -q
